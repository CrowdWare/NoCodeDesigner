<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoCodeDesigner</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <script type="application/javascript" src="composeApp.js"></script>
    <script>
        // JavaScript-Funktion, die fetch ausführt und Kotlin-Callbacks als Parameter akzeptiert
        function fetchData(url, uuid, pid, onSuccess, onError) {
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',  // Ändere Content-Type auf application/json
                },
                body: JSON.stringify({
                    'uuid': uuid,
                    'pid': pid
                })  // Sende den Body als JSON
            })
            .then(response => response.text())
            .then(data => {
                // Erfolgreiches Ergebnis: Aufruf des übergebenen Kotlin-Callback onSuccess
                onSuccess(data);
            })
            .catch(error => {
                // Fehler beim Fetch: Aufruf des übergebenen Kotlin-Callback onError
                onError(error.toString());
            });
        }
    </script>
    <script>
        // will be used from NoCodeLib
        function parseXmlString(xmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            //return xmlDoc.documentElement.outerHTML; // Gibt den Inhalt des XML als String zurück
            return xmlDoc;
        }
    </script>
</head>

</body>
</html>
