<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{{content}}}</title>
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Prevent overflow on body */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-color: #f8f9fa;
        }

        /* Scaled-up tablet container */
        .tablet {
            width: 500px;
            height: 800px;
            border: 16px solid #333;
            border-radius: 30px;
            padding: 10px;
            background-color: #444;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            overflow: hidden; /* Enforce boundary */
        }

        /* Inner screen area with scroll control */
        .screen {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden; /* Disable horizontal scroll */
            border-radius: 20px;
            background-color: #fff;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Content area with strict wrapping */
        .book-content {
            font-size: 1rem;
            line-height: 1.6;
            color: #333;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%; /* Force content to respect container width */
        }

        /* Hide scrollbar for clean look */
        .screen::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

<div class="tablet">
    <div class="screen">
        <div class="book-content">
            {{{content}}}
        </div>
    </div>
</div>

</body>
</html>
